name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - web/**
      - .github/workflows/deploy-web-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
      VITE_ANILIST_CLIENT_ID: ${{ vars.VITE_ANILIST_CLIENT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate required variables
        run: |
          if [ -z "${VITE_ANILIST_CLIENT_ID}" ]; then
            echo "::error::Missing Actions variable VITE_ANILIST_CLIENT_ID. Add it in Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Rollup Linux binary
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@$(node -p "require('./node_modules/rollup/package.json').version")

      - name: Build web app
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
